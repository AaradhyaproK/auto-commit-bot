name: Daily Auto Commit

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at 12 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update File
        run: |
          echo "Last updated on $(date)" >> update.txt

      - name: Commit Changes
        run: |
          git config --global user.name "Aaradhya Pathak"
          git config --global user.email "your-email@example.com"
          git add .
          git commit -m "🔄 Daily auto update"
          git push
